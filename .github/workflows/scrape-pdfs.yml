name: 抓取朋威行程 PDF

on:
  workflow_dispatch:
    inputs:
      batch_size:
        description: '每次最多抓幾筆 PDF'
        required: false
        default: '30'
      trip_id:
        description: '指定行程 ID（空白=自動抓缺 PDF 的）'
        required: false
        default: ''

  # 每日 UTC 19:30 = 台灣凌晨 03:30（行程抓取 03:00 完後自動跑）
  schedule:
    - cron: '30 19 * * *'

jobs:
  scrape-pdfs:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install Puppeteer
        run: npx puppeteer browsers install chrome

      - name: Run PDF scraper
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          BATCH="${{ github.event.inputs.batch_size || '30' }}"
          TRIP_ID="${{ github.event.inputs.trip_id || '' }}"
          if [ -n "$TRIP_ID" ]; then
            node scripts/scrape-pdfs.mjs --trip-id=$TRIP_ID
          else
            node scripts/scrape-pdfs.mjs --batch=$BATCH
          fi
