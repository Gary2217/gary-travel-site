name: 自動抓取朋威行程

on:
  # 手動觸發（從前端按鈕或 GitHub UI）
  workflow_dispatch:
    inputs:
      regions:
        description: '要抓取的區域（逗號分隔，all=全部）'
        required: false
        default: 'all'
      destination_id:
        description: '指定目的地 ID'
        required: false
        default: ''
      trip_ids:
        description: '指定行程 IDs（逗號分隔）'
        required: false
        default: ''

  # 排程觸發（每日 UTC 19:00 = 台灣凌晨 03:00）
  schedule:
    - cron: '0 19 * * *'

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Check auto-scrape setting
        if: github.event_name == 'schedule'
        id: check-auto
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          # 檢查 site_settings 是否啟用自動抓取
          ENABLED=$(node -e "
            const{createClient}=require('@supabase/supabase-js');
            const sb=createClient(process.env.NEXT_PUBLIC_SUPABASE_URL,process.env.SUPABASE_SERVICE_ROLE_KEY);
            sb.from('site_settings').select('value').eq('key','scrape_auto_enabled').single()
              .then(({data})=>{console.log(data?.value===true||data?.value==='true'?'true':'false')})
              .catch(()=>console.log('false'));
          ")
          echo "enabled=$ENABLED" >> $GITHUB_OUTPUT

      - name: Skip if auto-scrape disabled
        if: github.event_name == 'schedule' && steps.check-auto.outputs.enabled != 'true'
        run: echo "自動抓取已關閉，跳過" && exit 0

      - name: Run scraper
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          REGIONS="${{ github.event.inputs.regions || 'all' }}"
          DEST_ID="${{ github.event.inputs.destination_id || '' }}"
          TRIP_IDS="${{ github.event.inputs.trip_ids || '' }}"
          ARGS=""
          if [ -n "$DEST_ID" ]; then
            ARGS="$ARGS --destination-id=$DEST_ID"
          fi
          if [ -n "$TRIP_IDS" ]; then
            ARGS="$ARGS --trip-ids=$TRIP_IDS"
          fi
          if [ -z "$ARGS" ]; then
            if [ "$REGIONS" != "all" ]; then
              ARGS="--regions=$REGIONS"
            fi
          fi
          node scripts/auto-scrape.mjs $ARGS

      - name: Auto cleanup (30 days)
        if: github.event_name == 'schedule'
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          node -e "
            const{createClient}=require('@supabase/supabase-js');
            const sb=createClient(process.env.NEXT_PUBLIC_SUPABASE_URL,process.env.SUPABASE_SERVICE_ROLE_KEY);
            (async()=>{
              const{data:s}=await sb.from('site_settings').select('value').eq('key','auto_cleanup_enabled').single();
              if(s?.value!==true&&s?.value!=='true'){console.log('自動清理未啟用');return;}
              const cutoff=new Date(Date.now()-30*86400000).toISOString();
              const{data:d1}=await sb.from('pending_changes').delete().in('status',['approved','dismissed']).lt('created_at',cutoff).select('id');
              const{data:d2}=await sb.from('scrape_logs').delete().lt('started_at',cutoff).select('id');
              console.log('清理完成：刪除 '+(d1?.length||0)+' 筆變更紀錄、'+(d2?.length||0)+' 筆抓取日誌');
            })();
          "

